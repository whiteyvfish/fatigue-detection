server:
  port: 8080
  servlet:
    context-path: /api
  tomcat:
    threads:
      max: 200        # 最大线程数
      min-spare: 10   # 最小空闲线程
    max-connections: 10000

# 在原有配置基础上添加
detection:
  result:
    save-path: D:/test_fatigue/results    # 结果图片保存路径
    save-original: false                  # 是否同时保存原图


# 文件上传大小限制（调大以支持高清图片）
spring:
  sql:
    init:
      mode: never
      schema-locations: classpath:schema.sql

  servlet:
    multipart:
      enabled: true
      max-request-size: 500MB
      max-file-size: 200MB
  application:
    name: fatigue-detection
    # 数据库配置（SQLite - 开发环境）
    #  datasource:
    #    url: jdbc:sqlite:fatigue_detection.db
    #    driver-class-name: org.sqlite.JDBC
    #    username: ""
    #    password: ""

    # MySQL配置（生产环境，取消注释使用）
  datasource:
    url: jdbc:mysql://localhost:3306/fatigue?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        # MySQL方言: org.hibernate.dialect.MySQL8Dialect
    open-in-view: false
    defer-datasource-initialization: true


  # 文件上传配置


# 视频疲劳检测（OpenCV 抽帧 + 异步调用现有 AI）
video:
  detection:
    # 抽帧策略：per_second=每秒 1 帧；every_n_frames=每 n 帧取 1 帧
    strategy: per_second
    every-n-frames: 5
    # 合并疲劳时间段时，相邻采样点间隔小于等于该值（秒）视为同一段
    merge-gap-seconds: 1.2
    # 上传根目录（其下为 {videoId}/xxx.mp4）
    uploads-dir: ./uploads/videos
    # 是否生成带红框标注的输出视频（部分环境 VideoWriter 编码失败时会自动跳过）
    generate-annotated-video: true
    # 标注视频文件名
    annotated-filename: annotated.mp4
# 文件上传限制（必须调大，视频文件通常几十MB起步）

# AI服务配置
ai:
  service:
    url: http://localhost:5000
    timeout: 120000            # 图片检测超时（120秒，CPU推理需要更长时间）
    video-timeout: 600000      # 视频分析超时（10分钟）
    max-connections: 20        # 连接池大小
# 日志
logging:
  level:
    com.fatigue.detection: DEBUG

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.fatigue.detection.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 开发环境打印SQL
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted  # 逻辑删除字段
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: fatigue-detection-secret-key-2024
  expiration: 86400000  # 24小时 = 24 * 60 * 60 * 1000