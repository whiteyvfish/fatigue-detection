<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>实时疲劳检测</title>
    <style>
        .container { display: flex; gap: 20px; padding: 20px; }
        video, canvas { width: 480px; height: 360px; border: 2px solid #333; }
        .panel { padding: 20px; background: #f5f5f5; border-radius: 8px; }
        .status { font-size: 24px; font-weight: bold; margin: 10px 0; }
        .status.drowsy { color: #dc143c; }
        .status.normal { color: #228b22; }
        .info { margin: 5px 0; }
    </style>
</head>
<body>
<div class="container">
    <!-- 左侧：摄像头画面 -->
    <div>
        <video id="video" autoplay playsinline></video>
        <br>
        <button id="btnStart">开始检测</button>
        <button id="btnStop">停止</button>
    </div>

    <!-- 右侧：检测结果 -->
    <div class="panel">
        <div id="statusText" class="status normal">初始化...</div>
        <div class="info">检测目标数: <span id="count">0</span></div>
        <div class="info">置信度: <span id="conf">0%</span></div>
        <div class="info">服务端耗时: <span id="time">0</span>ms</div>
        <div class="info">FPS: <span id="fps">0</span></div>
        <!-- 隐藏的画布用于截帧 -->
        <canvas id="canvas" width="480" height="360" style="display:none;"></canvas>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('statusText');
    const API_URL = 'http://localhost:8080/api/detection/frame'; // 你的后端地址

    let stream = null;
    let timer = null;
    let lastTime = 0;
    let frameCount = 0;

    // 1. 打开摄像头
    async function startCamera() {
        stream = await navigator.mediaDevices.getUserMedia({
            video: { width: 480, height: 360, facingMode: 'user' }
        });
        video.srcObject = stream;
    }

    // 2. 截帧并发送检测
    async function detectFrame() {
        // 把视频当前帧画到 canvas
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        // 压缩质量降低传输体积（0.6 足够）
        const base64 = canvas.toDataURL('image/jpeg', 0.6);

        const start = performance.now();
        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image_base64: base64 })
            });
            const json = await res.json();
            const data = json.data || {};

            // 更新 UI
            const state = data.fatigueState || 'unknown';
            statusText.textContent = state === 'drowsy' ? '⚠️ 疲劳' : (state === 'normal' ? '✓ 清醒' : '未检测');
            statusText.className = 'status ' + (state === 'drowsy' ? 'drowsy' : 'normal');

            document.getElementById('count').textContent = data.count ?? 0;
            document.getElementById('conf').textContent = ((data.confidence || 0) * 100).toFixed(1) + '%';
            document.getElementById('time').textContent = data.serverTime || 0;

            // 计算前端 FPS
            frameCount++;
            const now = performance.now();
            if (now - lastTime > 1000) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                lastTime = now;
            }

            // 可选：把检测框画回画面（需要后端返回 bbox，前端绘制）
            if (data.detections && data.detections.length > 0) {
                drawDetections(data.detections);
            }

        } catch (e) {
            console.error('检测失败', e);
        }
    }

    // 3. 在视频上画检测框（前端绘制）
    function drawDetections(detections) {
        // 创建临时画布覆盖层
        const overlay = document.createElement('canvas');
        overlay.width = video.videoWidth || 480;
        overlay.height = video.videoHeight || 360;
        const octx = overlay.getContext('2d');

        detections.forEach(det => {
            const [x1, y1, x2, y2] = det.bbox;
            const color = det.label.includes('closed') || det.label.includes('yawn') ? '#dc143c' : '#228b22';
            octx.strokeStyle = color;
            octx.lineWidth = 3;
            octx.strokeRect(x1, y1, x2 - x1, y2 - y1);
            octx.fillStyle = color;
            octx.font = '16px sans-serif';
            octx.fillText(`${det.label} ${(det.score * 100).toFixed(0)}%`, x1, y1 - 5);
        });

        // 这里简化处理：实际项目中建议用绝对定位的 canvas 覆盖在 video 上
    }

    // 4. 控制
    document.getElementById('btnStart').onclick = () => {
        if (!stream) startCamera();
        // 每 200ms 检测一次（约 5 FPS，平衡实时性和服务器压力）
        timer = setInterval(detectFrame, 200);
    };

    document.getElementById('btnStop').onclick = () => {
        clearInterval(timer);
        if (stream) {
            stream.getTracks().forEach(t => t.stop());
            stream = null;
        }
    };

    // 默认启动摄像头
    startCamera();
</script>
</body>
</html>
